# OpenNext on Cloudflare Workers — https://opennext.js.org/cloudflare
# Set HYPERDRIVE_ID in .dev.vars (local) or the dashboard (production) and reference below,
# or replace the id value with your Hyperdrive configuration ID from the Cloudflare dashboard.

name = "alaseel-pod"
main = "worker.ts"
compatibility_date = "2025-03-01"
compatibility_flags = [ "nodejs_compat", "global_fetch_strictly_public" ]

[email]
type = "email"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "alaseel-pod"

[images]
binding = "IMAGES"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "dbd879f0f4844b5792c809ef486c878a"

[[routes]]
pattern = "pod.mazati.au/*"
zone_name = "mazati.au"
